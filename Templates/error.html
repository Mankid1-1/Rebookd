<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rebooked | {{ title }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>body { font-family: "Plus Jakarta Sans", sans-serif; }</style>
</head>
<body class="min-h-screen bg-[linear-gradient(180deg,_#f8fafc,_#ecfdf5_45%,_#ffffff)] text-slate-900">
  <div class="mx-auto flex min-h-screen max-w-2xl flex-col items-center justify-center px-6 py-20 text-center">
    <p class="text-8xl font-extrabold text-emerald-200">{{ code }}</p>
    <h1 class="mt-4 text-3xl font-extrabold text-slate-950">{{ title }}</h1>
    <p class="mt-4 text-base leading-7 text-slate-500">{{ message }}</p>
    <div class="mt-10 flex flex-wrap justify-center gap-3">
      <a href="/dashboard" class="rounded-2xl bg-[linear-gradient(135deg,_#111827,_#0f766e)] px-6 py-3 text-sm font-bold text-white shadow-lg transition hover:-translate-y-0.5">
        Go to dashboard
      </a>
      <a href="javascript:history.back()" class="rounded-2xl border border-slate-300 px-6 py-3 text-sm font-bold text-slate-700 transition hover:bg-white">
        Go back
      </a>
    </div>
  </div>
</body>
</html>
