services:
  migrate:
    build:
      context: .
      target: migrate
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-example}@db:3306/rebooked
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  app:
    build:
      context: .
      target: runner
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DOCKER_ENV: "true"
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-example}@db:3306/rebooked
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      APP_URL: ${APP_URL:-http://localhost:3000}
      OWNER_OPEN_ID: ${OWNER_OPEN_ID:-placeholder}
      # Telnyx (preferred SMS provider)
      TELNYX_API_KEY: ${TELNYX_API_KEY:-}
      TELNYX_FROM_NUMBER: ${TELNYX_FROM_NUMBER:-}
      TELNYX_PUBLIC_KEY: ${TELNYX_PUBLIC_KEY:-}
      # Twilio (fallback SMS provider)
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      # Stripe
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      # Email
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-hello@rebooked.com}
      # Inbound tRPC webhooks — required for production (see .env.example)
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      # TextLinkSMS (primary SMS provider)
      TEXTLINKSMS_API_KEY: ${TEXTLINKSMS_API_KEY:-}
      # n8n workflow automation
      N8N_ENABLED: ${N8N_ENABLED:-false}
      N8N_BASE_URL: ${N8N_BASE_URL:-http://n8n:5678}
      N8N_API_KEY: ${N8N_API_KEY:-}
      # AI
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Observability
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker:
    build:
      context: .
      target: runner
    command: ["node", "dist/worker.js"]
    environment:
      NODE_ENV: production
      DOCKER_ENV: "true"
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-example}@db:3306/rebooked
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      APP_URL: ${APP_URL:-http://localhost:3000}
      TELNYX_API_KEY: ${TELNYX_API_KEY:-}
      TELNYX_FROM_NUMBER: ${TELNYX_FROM_NUMBER:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      TEXTLINKSMS_API_KEY: ${TEXTLINKSMS_API_KEY:-}
      TEXTLINKSMS_FROM_NUMBER: ${TEXTLINKSMS_FROM_NUMBER:-}
      N8N_ENABLED: ${N8N_ENABLED:-false}
      N8N_BASE_URL: ${N8N_BASE_URL:-http://n8n:5678}
      N8N_API_KEY: ${N8N_API_KEY:-}
      N8N_ADMIN_API_KEY: ${N8N_ADMIN_API_KEY:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-example}
      MYSQL_DATABASE: rebooked
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
      interval: 5s

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-changeme}
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678}
      - GENERIC_TIMEZONE=${TZ:-America/New_York}
      # Rebooked callback config — n8n uses these to call back into Rebooked
      - REBOOKED_URL=${APP_URL:-http://app:3000}
      - N8N_REBOOKED_KEY=${N8N_API_KEY:-}
      - DB_TYPE=mysqldb
      - DB_MYSQLDB_HOST=db
      - DB_MYSQLDB_PORT=3306
      - DB_MYSQLDB_DATABASE=n8n
      - DB_MYSQLDB_USER=root
      - DB_MYSQLDB_PASSWORD=${MYSQL_ROOT_PASSWORD:-example}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  db_data:
  n8n_data:
