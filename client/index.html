    <!-- Theme detection: runs synchronously before any CSS is parsed — eliminates
         flash of wrong theme. Must stay in <head> to fire before first paint. -->
    <script>
      (function(){
        var t = localStorage.getItem('rebooked-theme') || 'abyss';
        if (!['abyss','light','corporate','pink','emerald'].includes(t)) t = 'abyss';
