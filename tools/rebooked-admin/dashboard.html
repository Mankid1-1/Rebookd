<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rebooked Admin Console</title>
  <style>
    :root {
      --navy: #0D1B2A;
      --navy-light: #1B2838;
      --navy-lighter: #243447;
      --teal: #00A896;
      --teal-dim: rgba(0,168,150,0.15);
      --gold: #E8920A;
      --gold-dim: rgba(232,146,10,0.15);
      --red: #EF4444;
      --red-dim: rgba(239,68,68,0.15);
      --green: #22C55E;
      --green-dim: rgba(34,197,94,0.15);
      --yellow: #EAB308;
      --yellow-dim: rgba(234,179,8,0.15);
      --text: #E2E8F0;
      --text-dim: #94A3B8;
      --border: #334155;
      --bg: #0F172A;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .header { background: var(--navy); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
    .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
    .header .badge { background: var(--teal-dim); color: var(--teal); padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
    .header .live-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; margin-left: auto; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }

    .card { background: var(--navy); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .card-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
    .card-header h3 { font-size: 13px; font-weight: 600; }
    .card-body { padding: 16px; }

    .stat-card { padding: 20px; }
    .stat-card .label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .stat-card .value { font-size: 24px; font-weight: 700; }
    .stat-card .sub { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
    .stat-card .icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-bottom: 12px; }

    .status-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .status-row:last-child { border-bottom: none; }
    .status-row .key { font-size: 13px; color: var(--text-dim); }
    .status-row .val { font-size: 13px; font-family: 'Consolas', monospace; }

    .badge-status { display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; border-radius: 8px; font-size: 11px; font-weight: 600; }
    .badge-healthy { background: var(--green-dim); color: var(--green); }
    .badge-warning { background: var(--yellow-dim); color: var(--yellow); }
    .badge-error { background: var(--red-dim); color: var(--red); }
    .badge-info { background: var(--teal-dim); color: var(--teal); }

    .progress-bar { height: 6px; background: var(--navy-lighter); border-radius: 3px; overflow: hidden; margin-top: 8px; }
    .progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }

    .btn { padding: 8px 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--navy-light); color: var(--text); cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.15s; }
    .btn:hover { background: var(--navy-lighter); }
    .btn-teal { background: var(--teal); border-color: var(--teal); color: white; }
    .btn-teal:hover { opacity: 0.9; }
    .btn-red { background: var(--red-dim); border-color: rgba(239,68,68,0.3); color: var(--red); }
    .btn-group { display: flex; gap: 8px; margin-top: 12px; }

    .log-box { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-family: 'Consolas', monospace; font-size: 11px; line-height: 1.6; max-height: 300px; overflow-y: auto; white-space: pre-wrap; color: var(--text-dim); }

    .table { width: 100%; border-collapse: collapse; }
    .table th { text-align: left; font-size: 11px; color: var(--text-dim); padding: 8px 12px; border-bottom: 1px solid var(--border); }
    .table td { padding: 8px 12px; font-size: 12px; border-bottom: 1px solid var(--border); }

    @media (max-width: 900px) { .grid-4, .grid-3 { grid-template-columns: repeat(2, 1fr); } .grid-2 { grid-template-columns: 1fr; } }
    @media (max-width: 600px) { .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="header">
    <h1>Rebooked Admin Console</h1>
    <span class="badge" id="version-badge">loading...</span>
    <span class="badge" id="host-badge" style="background: var(--gold-dim); color: var(--gold);"></span>
    <div class="live-dot" id="live-dot" title="Polling every 5s"></div>
  </div>

  <div class="container">
    <!-- Top Stats -->
    <div class="grid-4">
      <div class="card stat-card">
        <div class="icon" style="background: var(--teal-dim);">&#x1F680;</div>
        <div class="label">Current Version</div>
        <div class="value" id="stat-version" style="font-size: 14px; font-family: Consolas, monospace;">--</div>
      </div>
      <div class="card stat-card">
        <div class="icon" style="background: var(--green-dim);">&#x23F1;</div>
        <div class="label">Uptime</div>
        <div class="value" id="stat-uptime">--</div>
      </div>
      <div class="card stat-card">
        <div class="icon" style="background: var(--yellow-dim);">&#x1F4BE;</div>
        <div class="label">Memory Usage</div>
        <div class="value" id="stat-memory">--</div>
        <div class="progress-bar"><div class="progress-fill" id="mem-bar" style="width: 0%; background: var(--green);"></div></div>
      </div>
      <div class="card stat-card">
        <div class="icon" style="background: var(--teal-dim);">&#x1F4E1;</div>
        <div class="label">Database</div>
        <div class="value" id="stat-db">--</div>
        <div class="sub" id="stat-db-sub"></div>
      </div>
    </div>

    <!-- System Details + PM2 -->
    <div class="grid-2">
      <div class="card">
        <div class="card-header"><h3>&#x1F5A5; Server Details</h3></div>
        <div class="card-body" id="server-details">
          <div class="status-row"><span class="key">Loading...</span></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h3>&#x2699; PM2 Processes</h3></div>
        <div class="card-body">
          <div id="pm2-list"><span style="color: var(--text-dim); font-size: 12px;">Loading...</span></div>
          <div class="btn-group">
            <button class="btn btn-teal" onclick="pm2Reload()">&#x21BB; Reload App</button>
            <button class="btn" onclick="pm2RestartWorker()">Restart Worker</button>
            <button class="btn" onclick="fetchLogs()">View Logs</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Logs -->
    <div class="card" style="margin-bottom: 24px;">
      <div class="card-header"><h3>&#x1F4DC; Application Logs</h3></div>
      <div class="card-body">
        <div class="log-box" id="log-box">Click "View Logs" to load recent logs...</div>
      </div>
    </div>
  </div>

  <script>
    let config = {};

    function formatUptime(s) {
      const d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600), m = Math.floor((s % 3600) / 60);
      if (d > 0) return d + 'd ' + h + 'h';
      if (h > 0) return h + 'h ' + m + 'm';
      return m + 'm';
    }

    async function fetchStatus() {
      try {
        const res = await fetch('/api/status');
        const d = await res.json();
        if (d.error) { document.getElementById('stat-version').textContent = 'Offline'; return; }

        document.getElementById('stat-version').textContent = (d.version || '--').slice(0, 16);
        document.getElementById('version-badge').textContent = 'v' + (d.version || '?').slice(0, 8);
        document.getElementById('stat-uptime').textContent = formatUptime(d.uptime || 0);

        const mem = d.memory || {};
        document.getElementById('stat-memory').textContent = (mem.heapUsed || 0) + ' / ' + (mem.heapTotal || 0) + ' MB';
        const pressure = mem.heapPressure || 0;
        const bar = document.getElementById('mem-bar');
        bar.style.width = pressure + '%';
        bar.style.background = pressure > 85 ? 'var(--red)' : pressure > 70 ? 'var(--yellow)' : 'var(--green)';

        const dbStatus = d.database?.status || 'unknown';
        document.getElementById('stat-db').innerHTML = '<span class="badge-status ' + (dbStatus === 'connected' ? 'badge-healthy' : 'badge-error') + '">' + dbStatus + '</span>';

        // Server details
        const details = [
          ['Node.js', d.nodeVersion],
          ['PID', d.pid],
          ['Platform', d.platform],
          ['Cluster Worker', '#' + (d.cluster?.workerId || '0')],
          ['Started At', d.startedAt ? new Date(d.startedAt).toLocaleString() : '--'],
          ['Worker Status', d.worker?.status || 'unknown'],
          ['Worker Heartbeat', d.worker?.lastHeartbeat ? new Date(d.worker.lastHeartbeat).toLocaleTimeString() : '--'],
          ['CPU (user)', (d.cpu?.user || 0) + 'ms'],
          ['CPU (system)', (d.cpu?.system || 0) + 'ms'],
          ['External Memory', (d.memory?.external || 0) + ' MB'],
        ];
        document.getElementById('server-details').innerHTML = details.map(([k, v]) =>
          '<div class="status-row"><span class="key">' + k + '</span><span class="val">' + (v || '--') + '</span></div>'
        ).join('');

        document.getElementById('live-dot').style.background = 'var(--green)';
      } catch {
        document.getElementById('live-dot').style.background = 'var(--red)';
        document.getElementById('stat-version').textContent = 'Offline';
      }
    }

    async function fetchPM2() {
      try {
        const res = await fetch('/api/pm2');
        const procs = await res.json();
        if (!Array.isArray(procs) || procs.length === 0) {
          document.getElementById('pm2-list').innerHTML = '<span style="color: var(--text-dim); font-size: 12px;">No PM2 processes found (SSH may not be configured)</span>';
          return;
        }
        document.getElementById('pm2-list').innerHTML = '<table class="table"><thead><tr><th>Name</th><th>Status</th><th>CPU</th><th>Memory</th><th>Restarts</th><th>Uptime</th></tr></thead><tbody>' +
          procs.map(p => {
            const env = p.pm2_env || {};
            const monit = p.monit || {};
            const status = env.status || 'unknown';
            const badge = status === 'online' ? 'badge-healthy' : status === 'stopping' ? 'badge-warning' : 'badge-error';
            return '<tr><td>' + (p.name || '--') + '</td><td><span class="badge-status ' + badge + '">' + status + '</span></td><td>' + (monit.cpu || 0) + '%</td><td>' + Math.round((monit.memory || 0) / 1024 / 1024) + 'MB</td><td>' + (env.restart_time || 0) + '</td><td>' + formatUptime(Math.floor((Date.now() - (env.pm_uptime || Date.now())) / 1000)) + '</td></tr>';
          }).join('') +
          '</tbody></table>';
      } catch {
        document.getElementById('pm2-list').innerHTML = '<span style="color: var(--text-dim); font-size: 12px;">SSH not configured — set --user and --password to enable PM2 management</span>';
      }
    }

    async function pm2Reload() {
      if (!confirm('Reload rebooked-app? This performs a zero-downtime rolling restart.')) return;
      try {
        const res = await fetch('/api/pm2/reload', { method: 'POST' });
        const data = await res.json();
        alert(data.ok ? 'Reload triggered!' : 'Error: ' + data.error);
        setTimeout(fetchPM2, 3000);
      } catch (err) { alert('Failed: ' + err.message); }
    }

    async function pm2RestartWorker() {
      if (!confirm('Restart the background worker?')) return;
      try {
        const res = await fetch('/api/pm2/restart-worker', { method: 'POST' });
        const data = await res.json();
        alert(data.ok ? 'Worker restarted!' : 'Error: ' + data.error);
        setTimeout(fetchPM2, 3000);
      } catch (err) { alert('Failed: ' + err.message); }
    }

    async function fetchLogs() {
      document.getElementById('log-box').textContent = 'Loading logs...';
      try {
        const res = await fetch('/api/logs?lines=100');
        const data = await res.json();
        document.getElementById('log-box').textContent = data.logs || data.error || 'No logs';
        document.getElementById('log-box').scrollTop = document.getElementById('log-box').scrollHeight;
      } catch (err) {
        document.getElementById('log-box').textContent = 'Failed to load logs: ' + err.message;
      }
    }

    async function init() {
      try {
        const res = await fetch('/api/config');
        config = await res.json();
        document.getElementById('host-badge').textContent = config.host + ':' + config.port;
      } catch {}
      fetchStatus();
      fetchPM2();
      setInterval(fetchStatus, 5000);
      setInterval(fetchPM2, 15000);
    }

    init();
  </script>
</body>
</html>
